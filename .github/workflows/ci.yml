name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }}, ${{ matrix.dependencies }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        dependencies: [highest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --no-coverage

  tests-lowest:
    name: PHPUnit (PHP 8.2, lowest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath
          coverage: none

      - name: Install dependencies (lowest)
        run: composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --no-coverage

  static-analysis:
    name: Static analysis (PHP 8.4, highest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: ./vendor/bin/pint --test

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse -c phpstan.neon.dist

      - name: Run Rector
        run: ./vendor/bin/rector process --dry-run

